limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;

server {
    listen 8080;
    server_name _;
    server_tokens off;

    client_max_body_size 1m;
    limit_req_status 429;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cache-Control "no-store" always;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        limit_req zone=api_per_ip burst=40 nodelay;
        # Let the Vue login page handle 401 responses instead of showing the browser's native Basic Auth dialog.
        proxy_hide_header WWW-Authenticate;
        proxy_pass http://pos-change-api:8081/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # TLS terminates at the external reverse proxy (Cloudflare or ingress).
        # The API must evaluate the original request as HTTPS.
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
