services:
  mysql:
    image: mysql:8.4@sha256:c592c15aaf4a1961e15d82eb31ea5987dda862d1c4b1e93424438c0e91dc1f8d
    environment:
      MYSQL_DATABASE: main
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME must be set}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      TZ: Asia/Taipei
    ports:
      - '127.0.0.1:${MYSQL_PORT:-3307}:3306'
    volumes:
      - pos_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'MYSQL_PWD="$${MYSQL_ROOT_PASSWORD}" mysqladmin ping -h localhost -u root --silent']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0

  pos-change-api:
    build:
      context: ../pos-change-api
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:mysql://mysql:3306/main?serverTimezone=Asia/Taipei&characterEncoding=utf-8
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME must be set}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POS_SECURITY_ENABLED: ${POS_SECURITY_ENABLED:-true}
      POS_SECURITY_REQUIRE_HTTPS: ${POS_SECURITY_REQUIRE_HTTPS:-true}
      POS_MAKER_USERNAME: ${POS_MAKER_USERNAME:?POS_MAKER_USERNAME must be set}
      POS_MAKER_PASSWORD: ${POS_MAKER_PASSWORD:?POS_MAKER_PASSWORD must be set}
      POS_REVIEWER_USERNAME: ${POS_REVIEWER_USERNAME:?POS_REVIEWER_USERNAME must be set}
      POS_REVIEWER_PASSWORD: ${POS_REVIEWER_PASSWORD:?POS_REVIEWER_PASSWORD must be set}
      CORS_ALLOWED_ORIGINS: http://localhost:${WEB_PORT:-8080},http://127.0.0.1:${WEB_PORT:-8080}
      LOG_PATH: /tmp/logs
    ports:
      - '127.0.0.1:${API_PORT:-8081}:8081'
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0
    depends_on:
      mysql:
        condition: service_healthy

  pos-web:
    build:
      context: .
    ports:
      - '127.0.0.1:${WEB_PORT:-8080}:8080'
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      pos-change-api:
        condition: service_healthy

volumes:
  pos_mysql_data:
