services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: main
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Taipei
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    volumes:
      - pos_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 10

  pos-change-api:
    build:
      context: ../pos-change-api
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:mysql://mysql:3306/main?serverTimezone=Asia/Taipei&characterEncoding=utf-8
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      POS_SECURITY_ENABLED: ${POS_SECURITY_ENABLED:-false}
      POS_MAKER_USERNAME: ${POS_MAKER_USERNAME:-}
      POS_MAKER_PASSWORD: ${POS_MAKER_PASSWORD:-}
      POS_REVIEWER_USERNAME: ${POS_REVIEWER_USERNAME:-}
      POS_REVIEWER_PASSWORD: ${POS_REVIEWER_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: http://localhost:${WEB_PORT:-8080},http://127.0.0.1:${WEB_PORT:-8080}
    ports:
      - '${API_PORT:-8081}:8081'
    depends_on:
      mysql:
        condition: service_healthy

  pos-web:
    build:
      context: .
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      pos-change-api:
        condition: service_healthy

volumes:
  pos_mysql_data:
